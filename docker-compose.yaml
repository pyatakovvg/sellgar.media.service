services:
  minio:
    image: minio/minio
    container_name: sellgar-media-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_storage:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server --console-address ':9001' /data

  minio_bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/sellgar
      "

  local_cdn:
    image: nginx:1.27-alpine
    container_name: sellgar-media-local-cdn
    ports:
      - '8088:80'
    volumes:
      - ./infra/local-cdn/nginx.conf:/etc/nginx/nginx.conf:ro
      - local_cdn_cache:/var/cache/nginx
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  minio_storage:
    driver: local
  local_cdn_cache:
    driver: local
